<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Lock screen — rendered before main content when PIN is active -->
  <div id="lockScreen" class="lock-screen hidden">
    <div class="lock-body">
      <div class="lock-icon">&#x1F512;</div>
      <p class="lock-title">WhichCard</p>
      <p class="lock-sub">Enter your PIN to continue</p>
      <input type="password" id="pinEntry" class="pin-entry-input" placeholder="PIN"
             maxlength="16" autocomplete="off">
      <p id="pinError" class="pin-error hidden">Incorrect PIN</p>
      <button id="pinSubmit" class="pin-submit-btn">Unlock</button>
    </div>
  </div>

  <div class="header">
    <div class="header-brand">
      <img class="brand-icon" src="icons/icon32.png" width="20" height="20" alt="">
      <h1>WhichCard</h1>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="Rescan page">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <button class="icon-btn" id="excludeBtn" title="Exclude this site">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
      </button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">
        <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="hidden">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <a class="appcaddy-wordmark" href="https://appcaddy.app" target="_blank" rel="noopener noreferrer" title="From AppCaddy">AppCaddy</a>
    </div>
  </div>

  <div id="excludePanel" class="exclude-panel hidden"></div>

  <div id="cardList" class="card-list"></div>

  <div id="emptyState" class="empty-state hidden">
    <p>No cards saved yet</p>
    <p>Add a card below, or visit a payment page and click "+ Name this card" next to any card number.</p>
  </div>

  <div class="add-card">
    <div class="add-card-row">
      <span class="add-network-btn" id="addNetworkBtn" title="Select card type"></span>
      <input type="text" id="newDigits" class="digits-input" placeholder="1234" maxlength="4" inputmode="numeric">
      <input type="text" id="newName" class="name-input" placeholder="Card name">
    </div>
  </div>

  <div class="footer">
    <div class="privacy-badge">
      <span class="shield">&#x1f6e1;</span>
      <span>Your labels never leave your browser.</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
